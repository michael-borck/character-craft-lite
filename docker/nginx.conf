server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: client-side routes (/settings, /about, …) must serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets are immutable — cache them aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html should always be revalidated so new deploys are picked up
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
